<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights by Country</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-cyan-50 to-blue-100 py-12 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8 flight-card">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">✈️ Flights by Country</h1>
        <p class="text-center text-gray-600 mb-8">Explore flight data for major airports worldwide.</p>

        <form id="questionForm" class="space-y-6">
            <div>
                <label for="airport" class="block text-sm font-medium text-gray-700 mb-1">
                    Select Airport
                </label>
                <select id="airport" class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 airport-select">
                    <option value="DXB">DXB - Dubai International</option>
                    <option value="LHR">LHR - London Heathrow</option>
                    <option value="CDG">CDG - Paris Charles de Gaulle</option>
                    <option value="SIN">SIN - Singapore Changi</option>
                    <option value="HKG">HKG - Hong Kong International</option>
                    <option value="AMS">AMS - Amsterdam Schiphol</option>
                </select>
            </div>

            <div>
                <label for="question" class="block text-sm font-medium text-gray-700 mb-1">
                    Your Question
                </label>
                <input type="text" id="question" 
                       placeholder="e.g., How many flights arrived from Germany?"
                       class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Ask Question
            </button>
        </form>

        <div id="answer" class="mt-8 hidden p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">Answer:</h2>
            <p id="answerText" class="text-gray-700"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
